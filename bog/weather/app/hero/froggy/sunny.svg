<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Sky background -->
  <rect width="200" height="200" fill="#87CEEB"/>
  <!-- Ground -->
  <rect y="155" width="200" height="45" fill="#90EE90"/>

  <!-- Sun -->
  <circle cx="160" cy="35" r="22" fill="#FFD700"/>
  <!-- Sun rays -->
  <line x1="160" y1="5" x2="160" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="65" x2="160" y2="70" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="35" x2="125" y2="35" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="190" y1="35" x2="195" y2="35" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="139" y1="14" x2="135" y2="10" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="181" y1="56" x2="185" y2="60" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="181" y1="14" x2="185" y2="10" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="139" y1="56" x2="135" y2="60" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>

  <!-- Lounge chair legs -->
  <rect x="45" y="148" width="6" height="18" rx="2" fill="#A0522D"/>
  <rect x="115" y="148" width="6" height="18" rx="2" fill="#A0522D"/>
  <!-- Lounge chair back support -->
  <rect x="105" y="128" width="6" height="30" rx="2" fill="#A0522D"/>
  <!-- Lounge chair surface -->
  <rect x="38" y="142" width="90" height="12" rx="5" fill="#FF8C00"/>
  <!-- Chair back rest -->
  <rect x="105" y="125" width="30" height="10" rx="4" fill="#FF8C00"/>

  <!-- Frog body -->
  <ellipse cx="80" cy="148" rx="30" ry="22" fill="#4CAF50"/>
  <!-- Frog head -->
  <circle cx="80" cy="122" r="20" fill="#4CAF50"/>
  <!-- Frog belly -->
  <ellipse cx="80" cy="150" rx="18" ry="13" fill="#A5D6A7"/>

  <!-- Sunglasses frame -->
  <rect x="62" y="118" width="14" height="9" rx="4" fill="#222"/>
  <rect x="80" y="118" width="14" height="9" rx="4" fill="#222"/>
  <line x1="76" y1="122" x2="80" y2="122" stroke="#222" stroke-width="2"/>
  <!-- Sunglasses lens tint -->
  <rect x="63" y="119" width="12" height="7" rx="3" fill="#FF6B6B" opacity="0.7"/>
  <rect x="81" y="119" width="12" height="7" rx="3" fill="#FF6B6B" opacity="0.7"/>

  <!-- Frog mouth (smile) -->
  <path d="M73 132 Q80 138 87 132" stroke="#2E7D32" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Frog eyes (bulging) -->
  <circle cx="70" cy="108" r="8" fill="#66BB6A"/>
  <circle cx="90" cy="108" r="8" fill="#66BB6A"/>
  <circle cx="70" cy="108" r="5" fill="white"/>
  <circle cx="90" cy="108" r="5" fill="white"/>
  <circle cx="71" cy="108" r="2.5" fill="#111"/>
  <circle cx="91" cy="108" r="2.5" fill="#111"/>
  <!-- Eye shine -->
  <circle cx="72" cy="107" r="1" fill="white"/>
  <circle cx="92" cy="107" r="1" fill="white"/>

  <!-- Frog arms/hands relaxed -->
  <ellipse cx="52" cy="150" rx="10" ry="6" fill="#4CAF50" transform="rotate(-20 52 150)"/>
  <ellipse cx="108" cy="148" rx="10" ry="6" fill="#4CAF50" transform="rotate(20 108 148)"/>
</svg>
