<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Night sky background -->
  <rect width="200" height="200" fill="#0D1B2A"/>
  <!-- Ground -->
  <rect y="162" width="200" height="38" fill="#1B3A2D"/>

  <!-- Stars -->
  <circle cx="20" cy="15" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="45" cy="8" r="1" fill="white" opacity="0.8"/>
  <circle cx="70" cy="18" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="100" cy="10" r="1" fill="white" opacity="0.7"/>
  <circle cx="125" cy="22" r="1.5" fill="white" opacity="0.85"/>
  <circle cx="150" cy="12" r="1" fill="white" opacity="0.8"/>
  <circle cx="175" cy="20" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="188" cy="8" r="1" fill="white" opacity="0.75"/>
  <circle cx="32" cy="42" r="1" fill="white" opacity="0.7"/>
  <circle cx="60" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="85" cy="38" r="1" fill="white" opacity="0.75"/>
  <circle cx="140" cy="45" r="1.5" fill="white" opacity="0.85"/>
  <circle cx="165" cy="38" r="1" fill="white" opacity="0.7"/>
  <circle cx="185" cy="48" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="10" cy="65" r="1" fill="white" opacity="0.7"/>
  <circle cx="48" cy="75" r="1" fill="white" opacity="0.65"/>
  <circle cx="170" cy="70" r="1" fill="white" opacity="0.7"/>
  <circle cx="192" cy="75" r="1" fill="white" opacity="0.65"/>

  <!-- Star twinkles (4-pointed) -->
  <g transform="translate(108,30)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
  </g>
  <g transform="translate(22,55)">
    <line x1="0" y1="-3" x2="0" y2="3" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  </g>
  <g transform="translate(178,52)">
    <line x1="0" y1="-3" x2="0" y2="3" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Moon (crescent) -->
  <circle cx="158" cy="38" r="22" fill="#FFF9C4"/>
  <circle cx="168" cy="32" r="18" fill="#0D1B2A"/>
  <!-- Moon glow -->
  <circle cx="158" cy="38" r="28" fill="#FFF9C4" opacity="0.08"/>

  <!-- Frog body -->
  <ellipse cx="100" cy="172" rx="30" ry="22" fill="#2E7D32"/>
  <!-- Frog head -->
  <circle cx="100" cy="148" r="21" fill="#2E7D32"/>
  <!-- Frog belly -->
  <ellipse cx="100" cy="174" rx="18" ry="13" fill="#4CAF50"/>

  <!-- Frog eyes (wide, looking up at stars) -->
  <circle cx="88" cy="133" r="9" fill="#388E3C"/>
  <circle cx="112" cy="133" r="9" fill="#388E3C"/>
  <circle cx="88" cy="133" r="6" fill="white"/>
  <circle cx="112" cy="133" r="6" fill="white"/>
  <!-- Pupils looking up -->
  <circle cx="88" cy="130" r="3.2" fill="#111"/>
  <circle cx="112" cy="130" r="3.2" fill="#111"/>
  <!-- Pupils reflect moonlight -->
  <circle cx="89" cy="129" r="1.2" fill="white"/>
  <circle cx="113" cy="129" r="1.2" fill="white"/>

  <!-- Frog mouth (wonder/awe) -->
  <circle cx="100" cy="155" r="4" fill="#1B5E20" opacity="0.7"/>

  <!-- Frog arms raised looking up -->
  <path d="M79 165 Q70 150 72 135" stroke="#2E7D32" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M121 165 Q130 150 128 135" stroke="#2E7D32" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Hand fingers suggestions -->
  <circle cx="72" cy="134" r="5" fill="#2E7D32"/>
  <circle cx="128" cy="134" r="5" fill="#2E7D32"/>

  <!-- Lily pad frog is sitting on -->
  <ellipse cx="100" cy="186" rx="38" ry="10" fill="#1B5E20"/>
  <path d="M100 176 L100 186 L138 186" fill="#2E7D32" opacity="0.5"/>
</svg>
