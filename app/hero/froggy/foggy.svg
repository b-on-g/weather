<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background (muted pale) -->
  <rect width="200" height="200" fill="#D8DDE0"/>
  <!-- Ground (barely visible) -->
  <rect y="158" width="200" height="42" fill="#B8C4BC" opacity="0.6"/>

  <!-- Frog body (slightly desaturated in fog) -->
  <ellipse cx="100" cy="168" rx="32" ry="22" fill="#5A9E60" opacity="0.7"/>
  <!-- Frog head -->
  <circle cx="100" cy="142" r="22" fill="#5A9E60" opacity="0.75"/>
  <!-- Frog belly -->
  <ellipse cx="100" cy="170" rx="20" ry="13" fill="#A0C8A5" opacity="0.7"/>

  <!-- Frog eyes -->
  <circle cx="88" cy="127" r="9" fill="#6BAF70" opacity="0.75"/>
  <circle cx="112" cy="127" r="9" fill="#6BAF70" opacity="0.75"/>
  <circle cx="88" cy="127" r="6" fill="white" opacity="0.8"/>
  <circle cx="112" cy="127" r="6" fill="white" opacity="0.8"/>
  <circle cx="89" cy="127" r="3" fill="#222" opacity="0.8"/>
  <circle cx="113" cy="127" r="3" fill="#222" opacity="0.8"/>

  <!-- Frog mouth (puzzled) -->
  <path d="M93 153 Q100 155 107 153" stroke="#2E7D32" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Frog arms -->
  <ellipse cx="74" cy="168" rx="11" ry="7" fill="#5A9E60" transform="rotate(-20 74 168)" opacity="0.7"/>
  <ellipse cx="126" cy="168" rx="11" ry="7" fill="#5A9E60" transform="rotate(20 126 168)" opacity="0.7"/>

  <!-- Fog layers (white/light gray blobs) -->
  <ellipse cx="100" cy="185" rx="110" ry="28" fill="white" opacity="0.55"/>
  <ellipse cx="30" cy="170" rx="55" ry="22" fill="white" opacity="0.5"/>
  <ellipse cx="170" cy="172" rx="50" ry="20" fill="white" opacity="0.5"/>

  <ellipse cx="100" cy="155" rx="90" ry="20" fill="white" opacity="0.45"/>
  <ellipse cx="20" cy="148" rx="45" ry="16" fill="white" opacity="0.4"/>
  <ellipse cx="180" cy="150" rx="40" ry="16" fill="white" opacity="0.4"/>

  <ellipse cx="100" cy="130" rx="80" ry="18" fill="white" opacity="0.38"/>
  <ellipse cx="50" cy="122" rx="55" ry="14" fill="white" opacity="0.35"/>
  <ellipse cx="155" cy="125" rx="55" ry="14" fill="white" opacity="0.35"/>

  <ellipse cx="100" cy="105" rx="100" ry="20" fill="white" opacity="0.4"/>
  <ellipse cx="100" cy="75" rx="110" ry="25" fill="white" opacity="0.45"/>
  <ellipse cx="100" cy="45" rx="110" ry="30" fill="white" opacity="0.5"/>
</svg>
